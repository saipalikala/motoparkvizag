<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoPark Vizag — Premium Motorcycle Gear</title>
    <meta name="description" content="Shop helmets, jackets, gloves and riding gear at MotoPark Vizag." />

    <!-- Preconnect: start DNS+TLS for these origins before JS runs -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="preconnect" href="https://api.motoparkvizag.in" crossorigin />

    <!-- dns-prefetch: fallback for browsers that don't support preconnect -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://api.motoparkvizag.in" />
    <link rel="dns-prefetch" href="https://api.razorpay.com" />

    <!-- Preload the custom font so it's ready before carousel renders -->
    <link
      rel="preload"
      href="/assets/fonts/Sakana.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />

    <link rel="icon" type="image/svg+xml" href="/assets/logo/logo.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
